<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List Online 极简设计的网页版 Todo 清单 - 无需登陆 - By Ricocc</title>
  <meta name="keywords"
    content="无需登录, 不用账号,online todo, todo, todo list,在线Todo,网页todo,备忘录, Todo清单, 在线Todo清单,无需注册登陆,极简清单,即开即用,便签, 提醒, 日程, 记事本, 记事, 待办事件,online todolist, online 清单,online 待办事项,极简的待办事项">
  <meta name="description"
    content="一款优秀的设计简洁的online todolist 网页版本应用,极简的待办事项,Todo清单,无需注册,无需登录, 不用账号,数据安全, 存储在H5浏览器本地缓存, 提供工作和生活辅助! 在线Todo清单,免登录,做最好的 online todo list 清单应用.">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/index.css">
  <link rel="stylesheet" href="./iconfont/iconfont.css">
  <link type="favicon" rel="shortcut icon" href="https://todo.uiineed.com/public/img/favicon.png">
</head>

<body>
  <div class="wrapper">
    <div class="left">
      <!-- 大标题 -->
      <div class="header">
        <span class="iconfont icon-lingxing"></span>
        <span class="iconfont icon-lingxing"></span>
        <img src="./uploads/todo.svg" alt="">
        <span class="iconfont icon-lingxing"></span>
        <span class="iconfont icon-lingxing"></span>
      </div>

      <!-- 搜索框 -->
      <div class="search">
        <input type="text" placeholder="新增待办事项...">
        <button type="submit">提交</button>
      </div>

      <!-- 主体 -->
      <div class="add-content">
        <div class="finish">
          <a href="#">
            <h3>全部标为完成</h3>
          </a>
          <a href="#">
            <p>今日事今日毕，勿将今事待明日！<span class="iconfont icon-todo-line"></span></p>
          </a>
        </div>
        <div class="todo-list">
          <ul>
            <li>
              <div class="content"><strong></strong>111</div>
              <div class="cha"><span class="iconfont icon-chacha"></span></div>
            </li>
          </ul>
        </div>
        <div class="no-finish">
          剩余1项未完成
        </div>
      </div>
    </div>

    <div class="right">
      <div class="list">
        <ul>
          <li><a href="#">开<span class="iconfont icon-shoucang"></span></a></li>
          <li><a href="#">全部</a></li>
          <li><a href="#">回收站</a></li>
          <li><a href="#">全部标为已完成</a></li>
          <li><a href="#">清除全部</a></li>
          <li><a href="#">导出数据</a></li>
          <li><a href="#">导入(txt/json)</a></li>
        </ul>
      </div>
    </div>
  </div>
</body>

</html>
